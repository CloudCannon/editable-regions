# Configuration contributed by the editable-regions Hugo module. Hugo
# deep-merges outputFormats, mediaTypes, and params from modules/themes into
# the project configuration.
#
# The one thing a module cannot contribute is the per-kind output list
# (slice values don't merge), so the consuming site must add:
#
#   [outputs]
#     home = ["HTML", "editable-regions"]

[mediaTypes."application/x-cc-editable-regions"]
  suffixes = ["js"]

[outputFormats.editable-regions]
  mediaType = "application/x-cc-editable-regions"
  baseName = "register-components"
  isPlainText = true
  notAlternative = true
  permalinkable = false
